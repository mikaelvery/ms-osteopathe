<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" fill="none">
  <defs>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4b87a"/>
      <stop offset="55%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#4ab3a8"/>
    </linearGradient>
  </defs>

  <!-- Ligne centrale -->
  <line x1="30" y1="6" x2="30" y2="74" stroke="url(#spineGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Vertèbre 1 — cervicale haute (petite) -->
  <rect x="21" y="7" width="18" height="7" rx="2"
    fill="none" stroke="url(#spineGrad)" stroke-width="1.6"/>
  <line x1="21" y1="10.5" x2="14" y2="8.5" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="39" y1="10.5" x2="46" y2="8.5" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Vertèbre 2 — cervicale -->
  <rect x="20" y="18" width="20" height="8" rx="2"
    fill="none" stroke="url(#spineGrad)" stroke-width="1.7" opacity="0.92"/>
  <line x1="20" y1="22" x2="12" y2="19.5" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
  <line x1="40" y1="22" x2="48" y2="19.5" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>

  <!-- Vertèbre 3 — dorsale -->
  <rect x="18" y="30" width="24" height="9" rx="2"
    fill="none" stroke="url(#spineGrad)" stroke-width="1.8" opacity="0.88"/>
  <line x1="18" y1="34.5" x2="9" y2="31.5" stroke="#c9a96e" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="34.5" x2="51" y2="31.5" stroke="#c9a96e" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>

  <!-- Vertèbre 4 — lombaire (grande) -->
  <rect x="16" y="43" width="28" height="11" rx="2.5"
    fill="none" stroke="url(#spineGrad)" stroke-width="1.9" opacity="0.78"/>
  <line x1="16" y1="48.5" x2="7" y2="45.5" stroke="#4ab3a8" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <line x1="44" y1="48.5" x2="53" y2="45.5" stroke="#4ab3a8" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>

  <!-- Vertèbre 5 — sacrum arrondi -->
  <rect x="19" y="58" width="22" height="10" rx="5"
    fill="none" stroke="url(#spineGrad)" stroke-width="1.6" opacity="0.6"/>

  <!-- Point central lumineux -->
  <circle cx="30" cy="40" r="1.5" fill="#c9a96e" opacity="0.5"/>
</svg>
